  query: |-
    USE Retool_BailmentConsumptionRequests;

    SET DATEFIRST 1; -- Monday = 1

    WITH pending_requests AS (
        SELECT
            RequestID,
            ReferenceNumber,
            RequesterName,
            RequesterEmail,
            Status,
            CurrentStepName,
            CurrentApproverName,
            CurrentApproverEmail,
            ModifiedOn,
            LastReminderLevel,

            CAST(ModifiedOn AT TIME ZONE 'UTC' AT TIME ZONE 'AUS Eastern Standard Time' AS datetime) AS ModifiedOnLocal,
            CAST(GETUTCDATE() AT TIME ZONE 'UTC' AT TIME ZONE 'AUS Eastern Standard Time' AS datetime) AS NowLocal
        FROM dbo.BailmentRequests
        WHERE CurrentApproverEmail IS NOT NULL
          AND CurrentApproverEmail <> ''
          AND Status LIKE 'Pending%'
    ),
    calculated AS (
        SELECT
            *,
            CAST(ModifiedOnLocal AS date) AS ModifiedDate,
            CAST(NowLocal AS date) AS TodayDate
        FROM pending_requests
    ),
    business_days AS (
        SELECT
            *,
            CASE
                WHEN ModifiedDate >= TodayDate THEN 0
                ELSE
                    DATEDIFF(DAY, ModifiedDate, TodayDate)
                    - (DATEDIFF(WEEK, ModifiedDate, TodayDate) * 2)
                    - CASE WHEN DATEPART(WEEKDAY, ModifiedDate) = 7 THEN 1 ELSE 0 END
                    - CASE WHEN DATEPART(WEEKDAY, TodayDate) = 6 THEN 1 ELSE 0 END
            END AS BusinessDaysPending
        FROM calculated
    ),
    reminders AS (
        SELECT
            *,
            CASE
                WHEN BusinessDaysPending >= 15 THEN 15
                WHEN BusinessDaysPending >= 7 THEN 7
                WHEN BusinessDaysPending >= 3 THEN 3
            END AS ReminderLevel
        FROM business_days
    )
    SELECT
        RequestID,
        ReferenceNumber,
        RequesterName,
        RequesterEmail,
        Status,
        CurrentStepName,
        CurrentApproverName,
        CurrentApproverEmail,
        ModifiedOn,
        ModifiedOnLocal,
        BusinessDaysPending,
        ReminderLevel
    FROM reminders
    WHERE ReminderLevel IS NOT NULL
      AND ISNULL(LastReminderLevel, 0) < ReminderLevel
    ORDER BY BusinessDaysPending DESC, ModifiedOn ASC;
